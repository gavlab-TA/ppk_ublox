# RTKLIB (demo5) options — u-blox ZED-F9P kinematic PPK vs a CORS base.
# Loaded by ppk_solve; it pins mode/dual-freq/base-position on top of these.
# Tune arthres / elmask / navsys for your site and antenna quality.

# --- positioning ------------------------------------------------------------
pos1-posmode       =kinematic        # moving rover
pos1-frequency     =l1+l2            # F9P dual band
pos1-soltype       =combined         # forward + backward (cleans convergence)
pos1-elmask        =15               # deg; raise near obstructions/multipath
pos1-snrmask_r     =off
pos1-snrmask_b     =off
# Vehicle dynamics model: OFF by default, deliberately.
# It predicts each epoch from the last with a constant-acceleration model. That
# is only valid when epochs are close together AND the motion is smooth; a
# vehicle cornering across a gap breaks both. Measured on the NCAT truck (see
# README "Why the fix rate is a config setting"): with epochs >= 10 s apart it
# takes the fix rate to *zero*, and even on continuous 1 Hz data it is slightly
# worse than off (96.8% vs 98.0%). Turning it on is a tuning exercise -- it needs
# stats-prnaccelh/v matched to the vehicle -- not a free win.
pos1-dynamics      =off              # see above before setting this to 'on'
pos1-tidecorr      =off
pos1-ionoopt       =brdc             # short baseline: broadcast iono is fine
pos1-tropopt       =saas             # Saastamoinen
pos1-sateph        =brdc             # broadcast ephemeris
pos1-navsys        =45               # GPS(1)+GLO(4)+GAL(8)+BDS(32)=45

# --- ambiguity resolution ---------------------------------------------------
pos2-armode        =fix-and-hold     # good for continuous kinematic tracking
pos2-gloarmode     =on
pos2-arthres       =3.0              # AR ratio test; raise to reduce false fixes
pos2-arfilter      =on
pos2-arlockcnt     =0
pos2-arelmask      =15
pos2-arminfix      =10
pos2-elmaskhold    =15
pos2-aroutcnt      =20
pos2-maxage        =30               # s; max base-rover time gap
pos2-rejionno      =30

# --- output -----------------------------------------------------------------
out-solformat      =xyz              # ppk_solve forces ECEF anyway
out-outhead        =on
out-outopt         =on
out-timesys        =gpst
out-timeform       =tow
out-height         =ellipsoidal
out-geoid          =internal

# --- base station -----------------------------------------------------------
# ppk_solve always overwrites the base position (from --base-ecef/--base-llh
# or the base RINEX header), so these are placeholders.
ant2-postype       =xyz
ant2-pos1          =0
ant2-pos2          =0
ant2-pos3          =0

# --- stats (F9P-ish defaults) ----------------------------------------------
stats-eratio1      =300
stats-eratio2      =300
stats-errphase     =0.003
stats-errphaseel   =0.003
